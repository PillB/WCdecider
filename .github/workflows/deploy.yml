name: Build, Test & Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Run replication pipeline
        run: python3 wc_model_v4_replicable_pipeline.py

      - name: Run pytest (model + report)
        run: |
          pytest tests/test_peer_replication.py \
                 tests/test_translation_toggle.py \
                 tests/test_report_playwright_compliance.py \
                 -v --tb=short

      - name: Build site artifact (smoke)
        run: python3 scripts/build_site.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: python3 scripts/build_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  validate-deployed:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Playwright
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Validate deployed site (retry until live)
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.page_url }}
        run: python3 scripts/wait_and_validate_deploy.py