name: Build, Test & Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Run June 22-27 reproducible pipeline
        run: python3 wc_june22_27_pipeline.py

      - name: Generate field-level subagent audit manifest
        run: python3 scripts/generate_datapoint_audit.py

      - name: Generate JSON-driven report
        run: python3 scripts/generate_report.py

      - name: Build exact site artifact
        run: python3 scripts/build_site.py

      - name: Run full pytest matrix
        run: pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run June 22-27 reproducible pipeline
        run: python3 wc_june22_27_pipeline.py

      - name: Generate field-level subagent audit manifest
        run: python3 scripts/generate_datapoint_audit.py

      - name: Generate JSON-driven report
        run: python3 scripts/generate_report.py

      - name: Build static site
        run: python3 scripts/build_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  validate-deployed:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Playwright
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Validate deployed site (retry until live)
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.page_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/wait_and_validate_deploy.py
