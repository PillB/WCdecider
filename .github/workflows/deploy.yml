name: Build, Test & Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Build evidence-graded historical odds corpus
        run: python3 historical_odds_pipeline.py build-canonical

      - name: Run nested chronological model championship
        run: python3 model_championship.py

      - name: Build fail-closed recommendation promotion evidence
        run: python3 promotion_pipeline.py

      - name: Run June 22-27 reproducible pipeline
        run: python3 wc_june22_27_pipeline.py

      - name: Merge historical and championship metrics
        run: python3 scripts/merge_research_metrics.py

      - name: Diagnose regenerated release drift
        run: |
          python3 - <<'PY'
          import json
          import subprocess

          def committed_json(path):
              raw = subprocess.check_output(["git", "show", f"HEAD:{path}"])
              return json.loads(raw)

          def differences(expected, actual, pointer=""):
              if type(expected) is not type(actual):
                  yield pointer or "/", type(expected).__name__, type(actual).__name__
                  return
              if isinstance(expected, dict):
                  for key in sorted(set(expected) | set(actual)):
                      child = f"{pointer}/{key}"
                      if key not in expected:
                          yield child, "<missing>", actual[key]
                      elif key not in actual:
                          yield child, expected[key], "<missing>"
                      else:
                          yield from differences(expected[key], actual[key], child)
              elif isinstance(expected, list):
                  if len(expected) != len(actual):
                      yield pointer or "/", f"len={len(expected)}", f"len={len(actual)}"
                  for index, (left, right) in enumerate(zip(expected, actual)):
                      yield from differences(left, right, f"{pointer}/{index}")
              elif expected != actual:
                  yield pointer or "/", expected, actual

          for path in (
              "wc_june22_27_predictions.json",
              "wc_june22_27_model_metrics.json",
          ):
              expected = committed_json(path)
              actual = json.load(open(path, encoding="utf-8"))
              drift = list(differences(expected, actual))
              print(f"{path}: semantic_difference_count={len(drift)}")
              for pointer, left, right in drift[:40]:
                  print(f"  {pointer}: committed={left!r}; regenerated={right!r}")
          PY

      - name: Generate field-level subagent audit manifest
        run: python3 scripts/generate_datapoint_audit.py

      - name: Generate role-level research-agent release validation
        run: python3 scripts/generate_release_validation.py

      - name: Generate JSON-driven report
        run: python3 scripts/generate_report.py

      - name: Build exact site artifact
        run: python3 scripts/build_site.py

      - name: Run full pytest matrix
        run: pytest tests/ -v --tb=short

      - name: Upload exact tested Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  validate-deployed:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Playwright
        run: |
          pip install -r requirements-ci.txt
          playwright install --with-deps chromium

      - name: Validate deployed site (retry until live)
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.page_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/wait_and_validate_deploy.py
